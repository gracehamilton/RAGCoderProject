<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RAG Coder Frontend</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; }
      .container { max-width: 800px; margin: auto; }
      label { display:block; margin-top:1rem; }
      select, textarea, input[type=text] { width:100%; padding:0.5rem; margin-top:0.25rem }
      .row { display:flex; gap:1rem }
      .col { flex:1 }
      .answer { white-space:pre-wrap; background:#f7f7f7; padding:1rem; margin-top:1rem }
      .flash { color: green }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>RAG Coder — Frontend</h1>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <ul class="flash">
            {% for m in messages %}
              <li>{{ m }}</li>
            {% endfor %}
          </ul>
        {% endif %}
      {% endwith %}

      <form method="post" action="/ask">
        <label for="inference_model">Inference model</label>
        <select id="inference_model" name="inference_model">
          {% for m in inference_models %}
            <option value="{{ m }}">{{ m }}</option>
          {% endfor %}
        </select>

        <label for="embedding_model">Embedding model</label>
        <select id="embedding_model" name="embedding_model">
          {% for m in embedding_models %}
            <option value="{{ m }}">{{ m }}</option>
          {% endfor %}
        </select>

        <label for="vector_db">Vector DB</label>
        <select id="vector_db" name="vector_db">
          {% for v in vector_dbs %}
            <option value="{{ v }}">{{ v }}</option>
          {% endfor %}
        </select>

        <label for="question">Question</label>
        <textarea id="question" name="question" rows="4" placeholder="Enter your question here"></textarea>

        <div style="margin-top:1rem">
          <button type="submit">Ask</button>
        </div>
      </form>

      <hr>

      <h2>Upload PDF</h2>
      <form method="post" action="/upload" enctype="multipart/form-data">
        <input type="file" name="file" accept="application/pdf">
        <div style="margin-top:1rem"><button type="submit">Upload</button></div>
      </form>

      {% if answer %}
        <h2>Answer</h2>
        <div class="answer">{{ answer }}</div>
      {% endif %}
    </div>
  </body>
</html>
